name: Compile NukkitCraftsman

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: 📦 Install leveldb.jar to local Maven repo
        run: |
          mvn install:install-file \
            -Dfile=lib/leveldb.jar \
            -DgroupId=com.tinfoiled.mcpe.leveldb \
            -DartifactId=leveldb \
            -Dversion=0.8 \
            -Dpackaging=jar

      - name: 🔨 Compile with Maven
        run: mvn clean package --batch-mode -DskipTests

      - name: 🏷️ Rename shaded JAR to server.jar
        run: |
          JAR_FILE=$(find target -maxdepth 1 -type f -name "*.jar" \
            ! -name "original-*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -print | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "❌ No se encontró el JAR shaded en target/"
            ls -la target/
            exit 1
          fi

          echo "✅ JAR encontrado: $JAR_FILE"
          cp "$JAR_FILE" target/server.jar
          echo "📦 Copiado como target/server.jar"

      - name: 📤 Upload server.jar
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/server.jar
          if-no-files-found: error
          retention-days: 14

      - name: 📋 Build summary
        if: always()
        run: |
          echo "========================================="
          echo "  NukkitCraftsman Build Summary"
          echo "========================================="
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Java:   $(java -version 2>&1 | head -1)"
          echo ""
          echo "Archivos generados en target/:"
          ls -lh target/*.jar 2>/dev/null || echo "  (no JARs found)"
          echo "========================================="
