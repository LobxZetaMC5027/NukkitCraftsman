name: Build server.jar (MagmaBlock)

on:
  push:
    branches: [ master, main ]   # Cambia si tu branch principal se llama diferente
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:   # Para ejecutarlo manualmente desde la web

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'   # Adoptium, muy estable para Java 8

      - name: Grant execute permission for gradlew (por si acaso, aunque es Maven)
        run: chmod +x gradlew  # Ignora si no existe, no afecta

      - name: Build with Maven
        run: mvn clean package --batch-mode

      - name: Find and rename the JAR to server.jar
        run: |
          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" ! -name "original-*.jar" -print | head -n 1)
          if [ -z "$JAR_FILE" ]; then
            echo "❌ No se encontró JAR ejecutable en target/"
            exit 1
          fi
          echo "JAR encontrado: $JAR_FILE"
          cp "$JAR_FILE" target/server.jar
          echo "Renombrado a target/server.jar"

      - name: Upload server.jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: target/server.jar
          retention-days: 7   # Cuántos días se guarda el artifact

      - name: Show success message
        run: echo "¡Listo! Descarga server.jar desde la pestaña Actions → resumen del workflow"
